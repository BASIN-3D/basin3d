# provide clear, concise and publicly releasable description of the software
description: >
  BASIN-3D is a software ecosystem that synthesizes diverse earth science data
  from a variety of remote data sources on-demand, without the need for storing
  data in a single database. It is designed to parse, translate, and synthesize
  diverse observations from well-curated repositories into standardized formats
  for scientific uses such as analysis and visualization. Thus, BASIN-3D enables
  users to always have access to the latest data from each of the sources and
  interact with the data as if they were integrated in local storage. More
  importantly, users can also integrate public data without establishing prior
  working relationships with each data source.

  FROM OSS application:
  BASIN-3D (Broker for Assimilation, Synthesis and Integration of eNvironmental Diverse, Distributed Datasets)
  uses a data brokering approach to synthesize diverse earth science data from a variety of remote sources in
  real-time without the need for additional storage. BASIN-3D is an extendable Django web framework application
  using a generalized data synthesis model that makes the synthesized data available via REpresentational State
  Transfer (REST) Application Programming Interface (API). We have currently implemented our data synthesis
  model to represent sensor-based time series earth science observations across a hierarchy of spatial locations.
  Supporting our data synthesis model is a plugin framework that allows developers to map data sources of
  interest to the BASIN-3D synthesis model.
